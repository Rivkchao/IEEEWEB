<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOR Arsip | IEEE SB UNM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/styletor.css">
</head>

<body>

    <nav class="header-strip px-5 py-5 sm:px-8 sm:py-7 z-[100] relative">
        <div class="max-w-5xl mx-auto flex items-center justify-between gap-4">

            <div class="flex items-center gap-3">
                <div style="background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12)"
                    class="px-3 py-1.5 rounded-lg flex items-center gap-2">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#D91C29" stroke-width="2.2"
                        class="hidden md:block">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M12 2v4M12 18v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M2 12h4M18 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" />
                    </svg>
                    <span style="font-family:Syne,sans-serif; font-size:0.68rem; font-weight:700"
                        class="text-center">IEEE SB UNM</span>
                </div>
                <h1 style="font-family:Syne,sans-serif; font-size:1.2rem; font-weight:800">
                    TOR <span style="color:#D91C29">Archive</span>
                </h1>
            </div>

            <div id="menu"
                class="hidden sm:flex flex-col sm:flex-row absolute sm:static top-full left-0 w-full sm:w-auto bg-[#0f172a] sm:bg-transparent px-6 sm:px-0 py-6 sm:py-0 gap-5 text-sm font-semibold text-white shadow-xl sm:shadow-none">
                <div class="relative group" style="display: none;">
                    <button onclick="toggleDropdown('wp')"
                        class="w-full text-left flex justify-between items-center hover:text-red-400 transition-colors">
                        Workplan <svg class="w-4 h-4 sm:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>
                    <div id="dropdown-wp"
                        class="hidden sm:group-hover:block sm:absolute sm:right-0 pt-2 w-full sm:w-44 bg-transparent py-0">
                        <div class="bg-white text-black rounded-xl shadow-lg py-2">
                            <a href="/workplan/registry.html" class="block px-4 py-2 hover:bg-gray-100">Data
                                Workplan</a>
                            <a href="/workplan/registry-form.html" class="block px-4 py-2 hover:bg-gray-100">Form
                                Data</a>
                        </div>
                    </div>
                </div>
                <div class="relative group">
                    <button onclick="toggleDropdown('lt')"
                        class="w-full text-left flex justify-between items-center hover:text-red-400 transition-colors">
                        <div class="flex items-center gap-1">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path d="M4 6h16v12H4z" />
                                <path d="M4 6l8 6 8-6" />
                            </svg>
                            <span>Letter</span>
                        </div>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>

                    <div id="dropdown-lt"
                        class="hidden sm:group-hover:block sm:absolute sm:right-0 pt-2 w-full sm:w-44 bg-transparent py-0">
                        <div class="bg-white text-black rounded-xl shadow-lg py-2">
                            <a href="/letter/lpj.html" class="block px-4 py-2 hover:bg-gray-100">LPJ</a>
                            <a href="/letter/surat.html" class="block px-4 py-2 hover:bg-gray-100">Surat</a>
                            <a href="/letter/generate-tor.html"
                                class="block px-4 py-2 text-red-600  hover:bg-gray-100">TOR</a>
                            <a href="/letter/tor.html" class="block px-4 py-2 hover:bg-gray-100 font-bold">
                                Arsip TOR
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <button id="menuBtn" class="sm:hidden text-white p-2 hover:bg-white/10 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-5 sm:px-8 py-6 sm:py-8">

        <div class="flex flex-col lg:flex-row gap-4 mb-8 items-center">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 w-full lg:w-2/3">
                <div class="stat-card">
                    <div class="stat-icon bg-red-50">
                        <svg width="18" height="18" fill="none" stroke="#D91C29" stroke-width="2" viewBox="0 0 24 24">
                            <path
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                    </div>
                    <div>
                        <p class="stat-label">Total TOR</p>
                        <p id="statTotal" class="stat-value">—</p>
                    </div>
                </div>

                <div class="stat-card hidden md:flex">
                    <div class="stat-icon bg-green-50">
                        <svg width="18" height="18" fill="none" stroke="#16a34a" stroke-width="2" viewBox="0 0 24 24">
                            <path
                                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <div class="overflow-hidden">
                        <p class="stat-label">Terbaru</p>
                        <p id="statLatest" class="stat-value-sm">—</p>
                    </div>
                </div>
            </div>

            <div class="search-wrap w-full lg:w-1/3">
                <div class="relative w-full h-full">
                    <svg class="absolute left-4 top-1/2 -translate-y-[50%] text-gray-400" width="18" height="18"
                        fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input class="search-input w-full pl-11 pr-4 py-3 sm:py-4" type="text" id="searchInput"
                        placeholder="Cari event..." oninput="filterRows()" />
                </div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <div class="flex items-center gap-2">
                    <span class="table-title">Document List</span>
                    <span id="countBadge" class="count-badge hidden sm:inline-block opacity-0">0</span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="hidden sm:flex items-center gap-2">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                        <span class="text-[0.65rem] text-gray-400 font-medium">Live data</span>
                    </div>
                    <a href="generate-tor.html" class="btn-create">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path d="M12 4v16m8-8H4" />
                        </svg>
                    </a>
                </div>
            </div>

            <div class="table-wrapper">
                <table class="tor-table w-full text-left">
                    <thead>
                        <tr>
                            <th class="w-[50px] hidden sm:table-cell text-center">#</th>
                            <th class="w-1/2">Nama Event</th>
                            <th class="hidden sm:table-cell">Tanggal</th>
                            <th>Lokasi</th>
                            <th class="text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                    </tbody>
                </table>
            </div>
        </div>

        <p class="footer-note">
            Data disinkronkan dari Google Sheets · IEEE Student Branch UNM
        </p>
    </main>

    <div id="editModal"
        class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">
        <div class="section-card w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6 border-bottom pb-4">
                <h2 style="font-family:Syne; font-weight:800; font-size:1.2rem">Edit <span
                        style="color:#D91C29">TOR</span></h2>
                <button onclick="closeEditModal()" class="text-gray-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M6 18L18 6M6 6l18 18" />
                    </svg>
                </button>
            </div>
            <form id="editForm" class="space-y-4">
                <input type="hidden" id="editUrl">
                <div>
                    <label class="input-label">Nama Event</label>
                    <input type="text" id="editEventName" class="input-field">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="input-label">Tanggal</label>
                        <input type="text" id="editDate" class="input-field">
                    </div>
                    <div>
                        <label class="input-label">Lokasi</label>
                        <input type="text" id="editLocation" class="input-field">
                    </div>
                </div>
                <div class="mt-6 flex gap-3">
                    <button type="submit" id="btnSaveEdit" class="btn-generate w-full">Update TOR</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let allData = [];
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbyh0s6Wwp9tCWd87SWGbZB1cbYWD9VajvvoN4TReJuHPqkReGaUvi5GhSKeiCyLeN-Lyg/exec';

        async function loadHistory() {
            try {
                const response = await fetch(scriptUrl);
                const data = await response.json();
                allData = data;
                renderTable(data);
                updateStats(data);
            } catch (err) {
                document.getElementById('historyBody').innerHTML = `<tr><td colspan="5" class="p-10 text-center">Gagal memuat data.</td></tr>`;
            }
        }

        function renderTable(data) {
            const container = document.getElementById('historyBody');
            if (data.length === 0) {
                container.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-gray-400">Belum ada data.</td></tr>`;
                return;
            }

            container.innerHTML = data.map((item, i) => `
            <tr class="tor-row">
                <td class="hidden sm:table-cell text-center text-gray-400 font-bold text-xs">${i + 1}</td>
                <td>
                    <div class="event-name text-xs font-semibold text-white">${item.eventname || '—'}</div>
                    <div class="event-sub sm:hidden">${item.eventdate}</div>
                </td>
                <td class="hidden sm:table-cell text-[0.82rem] text-gray-600">${item.eventdate || '—'}</td>
                <td><span class="loc-badge">${item.location || 'N/A'}</span></td>
                <td class="text-center">
                    <div class="flex items-center justify-center gap-2">
                        <a href="${item.url}" target="_blank" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-all" title="Buka Dokumen">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                        </a>
                        <button onclick="openEditModal('${encodeURIComponent(JSON.stringify(item))}')" class="p-2 text-amber-600 hover:bg-amber-50 rounded-lg" title="Edit Data">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                        </button>
                        <button onclick="deleteTor('${item.url}')" class="p-2 text-red-600 hover:bg-red-50 rounded-lg" title="Hapus">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                    </div>
                </td>
            </tr>
        `).join('');
            updateCount(data.length);
        }

        function openEditModal(encodedData) {
            const item = JSON.parse(decodeURIComponent(encodedData));
            document.getElementById('editUrl').value = item.url;
            document.getElementById('editEventName').value = item.eventname;
            document.getElementById('editDate').value = item.eventdate;
            document.getElementById('editLocation').value = item.location;
            document.getElementById('editModal').classList.remove('hidden');
            document.getElementById('editModal').classList.add('flex');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        document.getElementById('editForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSaveEdit');
            btn.disabled = true;
            btn.innerText = "Memproses...";

            const payload = {
                action: 'edit',
                url: document.getElementById('editUrl').value,
                eventname: document.getElementById('editEventName').value,
                eventdate: document.getElementById('editDate').value,
                location: document.getElementById('editLocation').value
            };

            try {
                await fetch(scriptUrl, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                location.reload();
            } catch (err) {
                alert("Gagal mengedit data.");
                btn.disabled = false;
                btn.innerText = "Simpan Perubahan";
            }
        };

        async function deleteTor(url) {
            if (!confirm("Apakah Anda yakin ingin menghapus TOR ini?")) return;

            try {
                await fetch(scriptUrl, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'delete', url: url })
                });
                location.reload();
            } catch (err) {
                alert("Gagal menghapus.");
            }
        }

        function updateStats(data) {
            document.getElementById('statTotal').textContent = data.length;
            if (data.length > 0) {
                const last = data[data.length - 1].eventname;
                document.getElementById('statLatest').textContent = last.length > 20 ? last.slice(0, 18) + '..' : last;
            }
        }

        function updateCount(n) {
            const b = document.getElementById('countBadge');
            b.textContent = n;
            b.style.opacity = n > 0 ? '1' : '0';
        }

        function filterRows() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allData.filter(d =>
                d.eventname.toLowerCase().includes(q) || d.location.toLowerCase().includes(q)
            );
            renderTable(filtered);
        }

        // Mobile Menu Toggle
        const menuBtn = document.getElementById('menuBtn');
        const menu = document.getElementById('menu');
        menuBtn.addEventListener('click', () => menu.classList.toggle('hidden'));

        function toggleDropdown(id) {
            if (window.innerWidth < 640) {
                const el = document.getElementById('dropdown-' + id);
                el.classList.toggle('hidden');
            }
        }

        window.onload = loadHistory;
    </script>
</body>

</html>
