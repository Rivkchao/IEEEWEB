<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Surat Generator | IEEE SB UNM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/stylesurat.css">
</head>

<body>

    <!-- Toast -->
    <div id="toast">
        <svg id="toastIcon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"
            viewBox="0 0 24 24"></svg>
        <span id="toastMsg"></span>
    </div>

    <!-- ══════ HEADER ══════ -->
    <nav class="header-strip px-5 py-5 sm:px-8 sm:py-7 z-[100] relative">
        <div class="max-w-5xl mx-auto flex items-center justify-between gap-4">

            <div class="flex items-center gap-3">
                <div style="background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12)"
                    class="px-3 py-1.5 rounded-lg flex items-center gap-2">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#D91C29" stroke-width="2.2"
                        class="hidden md:block">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M12 2v4M12 18v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M2 12h4M18 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" />
                    </svg>
                    <span style="font-family:Syne,sans-serif; font-size:0.68rem; font-weight:700"
                        class="text-center">IEEE SB UNM</span>
                </div>
                <h1 style="font-family:Syne,sans-serif; font-size:1.2rem; font-weight:800">
                    SURAT <span style="color:#D91C29">Generate</span>
                </h1>
            </div>

            <div id="menu"
                class="hidden sm:flex flex-col sm:flex-row absolute sm:static top-full left-0 w-full sm:w-auto bg-[#0f172a] sm:bg-transparent px-6 sm:px-0 py-6 sm:py-0 gap-5 text-sm font-semibold text-white shadow-xl sm:shadow-none">
                <div class="relative group" style="display: none;">
                    <button onclick="toggleDropdown('wp')"
                        class="w-full text-left flex justify-between items-center hover:text-red-400 transition-colors">
                        Workplan <svg class="w-4 h-4 sm:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>
                    <div id="dropdown-wp"
                        class="hidden sm:group-hover:block sm:absolute sm:right-0 pt-2 w-full sm:w-44 bg-transparent py-0">
                        <div class="bg-white text-black rounded-xl shadow-lg py-2">
                            <a href="/workplan/registry.html" class="block px-4 py-2 hover:bg-gray-100">Data
                                Workplan</a>
                            <a href="/workplan/registry-form.html" class="block px-4 py-2 hover:bg-gray-100">Form
                                Data</a>
                        </div>
                    </div>
                </div>
                <div class="relative group">
                    <button onclick="toggleDropdown('lt')"
                        class="w-full text-left flex justify-between items-center hover:text-red-400 transition-colors">
                        <div class="flex items-center gap-1">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path d="M4 6h16v12H4z" />
                                <path d="M4 6l8 6 8-6" />
                            </svg>
                            <span>Letter</span>
                        </div>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M19 9l-7 7-7-7" />
                        </svg>
                    </button>

                    <div id="dropdown-lt"
                        class="hidden sm:group-hover:block sm:absolute sm:right-0 pt-2 w-full sm:w-44 bg-transparent py-0">
                        <div class="bg-white text-black rounded-xl shadow-lg py-2">
                            <a href="/letter/lpj.html" class="block px-4 py-2 hover:bg-gray-100">LPJ</a>
                            <a href="/letter/surat.html"
                                class="block px-4 py-2 text-red-600 hover:bg-gray-100">Surat</a>
                            <a href="/letter/generate-tor.html" class="block px-4 py-2 hover:bg-gray-100">TOR</a>
                            <a href="/letter/tor.html" class="block px-4 py-2 hover:bg-gray-100 font-bold">
                                Arsip TOR
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <button id="menuBtn" class="sm:hidden text-white p-2 hover:bg-white/10 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>
    </nav>

    <!-- ══════ MAIN ══════ -->
    <div class="max-w-4xl mx-auto px-4 sm:px-8 py-8 space-y-6">

        <!-- Form card -->
        <div class="section-card" style="animation-delay:0ms">
            <div
                style="margin:-24px -24px 0 -24px;padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;margin-bottom:0">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m3.75 9v6m3-3H9m1.5-12H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                </svg>
                <span style="font-family:Syne,sans-serif;font-size:0.75rem;font-weight:700;color:var(--ink)">Buat
                    Surat</span>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Left col -->
                <div class="space-y-4">
                    <div>
                        <label class="input-label">Tempat</label>
                        <input type="text" id="tempat" placeholder="e.g. Jakarta" class="input-field" />
                    </div>
                    <div>
                        <label class="input-label">Tanggal</label>
                        <input type="text" id="tgl" class="input-field" />
                    </div>
                </div>

                <!-- Right col -->
                <div class="space-y-4">
                    <div>
                        <label class="input-label">Perihal Surat</label>
                        <input type="text" id="perihal" placeholder="Perihal / Subject" class="input-field" />
                    </div>
                    <div>
                        <label class="input-label">Kepada Yth.</label>
                        <input type="text" id="kepada" placeholder="Kepada Yth..." class="input-field" />
                    </div>
                </div>

                <!-- Full width -->
                <div class="md:col-span-2">
                    <label class="input-label">Isi Surat</label>
                    <textarea id="isi" rows="4" placeholder="Tulis isi surat pengajuan di sini…"
                        class="input-field"></textarea>
                </div>
            </div>

            <button onclick="generateWord()" id="btnGenerate" class="btn-generate">
                <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <span id="btnText">Generate Letter</span>
            </button>
        </div>

        <!-- History card -->
        <div class="section-card" style="animation-delay:80ms">
            <!-- Card top bar -->
            <div
                style="margin:-24px -24px 0 -24px;padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;margin-bottom:0">
                <svg width="14" height="14" fill="none" stroke="var(--red)" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span style="font-family:Syne,sans-serif;font-size:0.75rem;font-weight:700;color:var(--ink)">Riwayat
                    Surat</span>
                <span id="countBadge" class="count-badge" style="opacity:0">0</span>
                <div style="flex:1"></div>
                <div style="display:flex;align-items:center;gap:6px">
                    <div class="dot-live" style="width:7px;height:7px;background:#22c55e;border-radius:50%"></div>
                    <span style="font-size:0.65rem;font-family:DM Sans,sans-serif;color:#9ca3af">Live sync</span>
                </div>
            </div>

            <div style="margin:0 -24px;overflow-x:auto">
                <table class="srt-table w-full text-left border-collapse" style="min-width:480px">
                    <thead>
                        <tr>
                            <th class="pl-6">Nomor & Perihal</th>
                            <th>Tujuan</th>
                            <th class="text-center pr-5">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr class="srt-row">
                            <td class="pl-6 py-4">
                                <div class="skeleton" style="width:200px;height:13px;margin-bottom:6px"></div>
                                <div class="skeleton" style="width:120px;height:10px"></div>
                            </td>
                            <td class="py-4">
                                <div class="skeleton" style="width:140px;height:13px"></div>
                            </td>
                            <td class="pr-6 py-4">
                                <div class="flex justify-end">
                                    <div class="skeleton" style="width:75px;height:30px;border-radius:10px"></div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <p style="font-size:0.7rem;color:#bbb;text-align:center;font-family:DM Sans,sans-serif">
            Dokumen tersimpan otomatis ke Google Drive · IEEE Student Branch Universitas Nusa Mandiri
        </p>
    </div>

    <div id="editModal"
        class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">
        <div class="section-card w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6 border-bottom pb-4">
                <h2 style="font-family:Syne; font-weight:800; font-size:1.2rem">Edit <span
                        style="color:#D91C29">Surat</span></h2>
                <button onclick="closeEditModal()" class="text-gray-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M6 18L18 6M6 6l18 18" />
                    </svg>
                </button>
            </div>

            <input type="hidden" id="editFileUrl">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="input-label">Tempat</label>
                    <input type="text" id="editTempat" class="input-field" />
                </div>
                <div>
                    <label class="input-label">Tanggal</label>
                    <input type="text" id="editTgl" class="input-field" />
                </div>
                <div>
                    <label class="input-label">Perihal</label>
                    <input type="text" id="editPerihal" class="input-field" />
                </div>
                <div>
                    <label class="input-label">Kepada</label>
                    <input type="text" id="editKepada" class="input-field" />
                </div>
                <div class="md:col-span-2">
                    <label class="input-label">Isi Surat</label>
                    <textarea id="editIsi" rows="6" class="input-field"></textarea>
                </div>
            </div>

            <div class="mt-6 flex gap-3">
                <button onclick="saveEdit()" id="btnSaveEdit" class="btn-generate w-full">Update Surat</button>
            </div>
        </div>
    </div>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwRMNWfHAOSdYX0ojhEgMdNbOtC1XcpqRftssutcy9N7XLyx7xjzLbQXB54E4q3B6cBuA/exec";

        // ── NAVIGASI & MOBILE MENU ──
        function initNavigation() {
            const menuBtn = document.getElementById('menuBtn');
            const menu = document.getElementById('menu');

            // Toggle Mobile Menu (Hamburger)
            if (menuBtn && menu) {
                menuBtn.addEventListener('click', () => {
                    menu.classList.toggle('hidden');
                });
            }

            // Fungsi Dropdown Klik untuk Mobile
            window.toggleDropdown = function (id) {
                // Hanya jalan di layar kecil (mobile)
                if (window.innerWidth < 640) {
                    const dropdown = document.getElementById('dropdown-' + id);
                    dropdown.classList.toggle('hidden');
                }
            };
        }

        // ── TOAST NOTIFICATION ──
        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            document.getElementById('toastMsg').textContent = msg;
            t.className = 'show ' + type;
            icon.innerHTML = type === 'success' ?
                '<path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>' :
                '<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>';
            setTimeout(() => { t.className = ''; }, 4000);
        }

        // ── TABLE & BADGE BUILDER ──
        function buildRow(nomor, perihal, tujuan, url, isNew = false, tempat = "", isi = "") {
            return `
                <tr class="srt-row${isNew ? ' row-new' : ''}" 
                    data-nomor="${nomor}" 
                    data-tempat="${tempat}"
                    data-perihal="${perihal}" 
                    data-tujuan="${tujuan}" 
                    data-isi="${isi}"
                    data-url="${url}">
                    <td class="pl-6 py-4">
                        <div style="font-family:Syne,sans-serif;font-weight:700;font-size:0.85rem;color:var(--ink)">${nomor}</div>
                        <div style="font-size:0.68rem;color:#bbb;text-transform:uppercase;letter-spacing:0.05em;margin-top:2px">${perihal}</div>
                    </td>
                    <td class="py-4" style="font-size:0.85rem;color:var(--muted)">${tujuan || '—'}</td>
                    <td class="pr-6 py-4">
                      <div class="flex justify-end gap-2">
                       
                    <button onclick="editSurat(this)" class="btn-preview" style="background: rgba(255,255,255,0.05); color: #fff; border-color: rgba(255,255,255,0.1)">
                         <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                    Edit
                    </button>
                    <a href="${url}" target="_blank" class="btn-preview">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                        Preview
                    </a>
                    <button onclick="deleteSurat('${url}', this)" class="btn-preview" style="background: rgba(220,38,38,0.1); color: #ef4444; border-color: rgba(220,38,38,0.2); padding: 8px">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
                    </td>
                </tr>`;
        }

        function updateCountBadge(n) {
            const badge = document.getElementById('countBadge');
            if (badge) {
                badge.textContent = n;
                badge.style.opacity = n > 0 ? '1' : '0';
            }
        }

        // ── CORE FUNCTIONS (Generate & Load) ──
        async function generateWord() {
            const btn = document.getElementById('btnGenerate');
            const btnText = document.getElementById('btnText');
            btn.disabled = true;
            btnText.textContent = 'Memproses…';

            const payload = {
                tempat: document.getElementById('tempat').value,
                tgl: document.getElementById('tgl').value,
                kepada: document.getElementById('kepada').value,
                perihal: document.getElementById('perihal').value,
                isi_surat: document.getElementById('isi').value,
            };

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const res = await response.json();

                if (res.status === 'success') {
                    const tbody = document.getElementById('historyBody');
                    tbody.insertAdjacentHTML('afterbegin', buildRow(
                        res.nomor,
                        payload.perihal,
                        payload.kepada,
                        res.url,
                        true,
                        payload.tempat,
                        payload.isi_surat
                    ));

                    updateCountBadge(tbody.querySelectorAll('tr').length);
                    showToast(`Surat berhasil dibuat! No. ${res.nomor}`, 'success');
                    ['perihal', 'kepada', 'isi'].forEach(id => document.getElementById(id).value = '');
                } else {
                    showToast('Gagal: ' + (res.message || 'Unknown error'), 'error');
                }
            } catch (e) {
                showToast('Gagal koneksi — pastikan deployment diset ke Anyone', 'error');
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Generate Letter';
            }
        }

        function openEditModal(url) {
            document.getElementById('editFileUrl').value = url;
            document.getElementById('editModal').classList.remove('hidden');
            document.getElementById('editModal').classList.add('flex');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editModal').classList.remove('flex');
        }

        async function saveEdit() {
            const btn = document.getElementById('btnSaveEdit');
            btn.disabled = true;
            btn.textContent = 'Updating...';

            const payload = {
                action: 'edit',
                url: document.getElementById('editFileUrl').value,
                tempat: document.getElementById('editTempat').value,
                tgl: document.getElementById('editTgl').value,
                kepada: document.getElementById('editKepada').value,
                perihal: document.getElementById('editPerihal').value,
                isi_surat: document.getElementById('editIsi').value,
            };

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const res = await response.json();
                if (res.status === 'success') {
                    showToast('Surat berhasil diperbarui!', 'success');
                    closeEditModal();
                    loadHistoryFromDrive(); // Refresh tabel
                }
            } catch (e) {
                showToast('Gagal update surat', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Update Surat';
            }
        }

        window.editSurat = function (btn) {
            const row = btn.closest('tr');

            // Ambil semua data dari atribut baris
            const url = row.getAttribute('data-url');
            const tempat = row.getAttribute('data-tempat');
            const perihal = row.getAttribute('data-perihal');
            const tujuan = row.getAttribute('data-tujuan');
            const isi = row.getAttribute('data-isi');

            // Masukkan ke form modal
            document.getElementById('editFileUrl').value = url;
            document.getElementById('editTempat').value = tempat;
            document.getElementById('editPerihal').value = perihal;
            document.getElementById('editKepada').value = tujuan;
            document.getElementById('editIsi').value = isi;
            document.getElementById('editTgl').value = document.getElementById('tgl').value;

            const modal = document.getElementById('editModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        };

        async function deleteSurat(url, btn) {
            if (!confirm('Apakah Anda yakin ingin menghapus surat ini?')) return;

            // Animasi loading pada tombol
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<svg class="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 2v4m0 12v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M2 12h4M18 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>';
            btn.disabled = true;

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'delete',
                        url: url
                    })
                });
                const res = await response.json();

                if (res.status === 'success') {
                    showToast('Surat berhasil dihapus', 'success');
                    // Hapus baris dari tabel tanpa refresh
                    const row = btn.closest('tr');
                    row.style.opacity = '0';
                    row.style.transform = 'translateX(20px)';
                    setTimeout(() => {
                        row.remove();
                        updateCountBadge(document.querySelectorAll('#historyBody tr').length);
                    }, 300);
                } else {
                    throw new Error(res.message);
                }
            } catch (e) {
                showToast('Gagal menghapus surat', 'error');
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }
        async function loadHistoryFromDrive() {
            const tbody = document.getElementById('historyBody');
            if (!tbody) return;

            try {
                const response = await fetch(SCRIPT_URL);
                const files = await response.json();
                tbody.innerHTML = '';
                rowCount = 0;

                if (!files.length) {
                    tbody.innerHTML = `<tr><td colspan="4" style="padding:48px 24px;text-align:center">
                <div style="font-size:1.4rem;margin-bottom:10px">📄</div>
                <p style="font-family:Syne,sans-serif;font-weight:700;color:#374151;margin-bottom:4px">Belum ada surat</p>
                <p style="font-size:0.8rem;color:#9ca3af">Buat surat pertama di atas</p>
            </td></tr>`;
                    return;
                }

                files.forEach(file => {
                    tbody.insertAdjacentHTML('beforeend', buildRow(
                        file.nomor,
                        file.perihal,
                        file.tujuan,
                        file.url,
                        false,
                        file.tempat,
                        file.isi
                    ));
                });
                updateCountBadge(files.length);
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="4" style="padding:48px 24px;text-align:center">
            <div style="font-size:1.4rem;margin-bottom:10px">⚠️</div>
            <p style="font-family:Syne,sans-serif;font-weight:700;color:#374151;margin-bottom:4px">Gagal memuat riwayat</p>
            <button onclick="loadHistoryFromDrive()" style="padding:8px 20px;background:var(--red);color:#fff;border:none;border-radius:10px;font-family:Syne,sans-serif;font-size:0.78rem;font-weight:700;cursor:pointer">Coba Lagi</button>
        </td></tr>`;
            }
        }

        function setAutoDate() {
            const tglInput = document.getElementById('tgl');
            if (!tglInput) return;

            const date = new Date();
            const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            tglInput.value = `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
        }

        // ── INITIALIZE ON LOAD ──
        window.addEventListener('load', () => {
            initNavigation();
            setAutoDate();
            loadHistoryFromDrive();
        });
    </script>
</body>

</html>
